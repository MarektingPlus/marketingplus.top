<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MarketingPlus - 专注2B品牌市场营销的专业内容平台，为品牌市场人提供深度文章、实战案例与行业洞察。" />
  <title>MarketingPlus - 品牌市场营销专业内容平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <style>
    :root {
      --color-primary: #2563EB;
      --color-primary-dark: #1D4ED8;
      --color-primary-light: #3B82F6;
      --color-primary-50: #EFF6FF;
      --color-secondary: #1E3A5F;
      --color-accent: #F59E0B;
      --color-accent-light: #FEF3C7;
      --color-text-dark: #0F172A;
      --color-text: #334155;
      --color-text-light: #64748B;
      --color-text-lighter: #94A3B8;
      --color-bg: #FFFFFF;
      --color-bg-soft: #F8FAFC;
      --color-bg-section: #F1F5F9;
      --color-border: #E2E8F0;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -1px rgba(0,0,0,0.04);
      --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -2px rgba(0,0,0,0.04);
      --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.08), 0 10px 10px -5px rgba(0,0,0,0.03);
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 16px;
      --radius-xl: 24px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --container-max: 1200px;
      --container-content: 800px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body { font-family: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif; color: var(--color-text); background: var(--color-bg); line-height: 1.7; -webkit-font-smoothing: antialiased; }
    img { max-width: 100%; display: block; }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }
    .container { max-width: var(--container-max); margin: 0 auto; padding: 0 24px; }
    .container--narrow { max-width: var(--container-content); margin: 0 auto; padding: 0 24px; }
    .section { padding: 80px 0; }
    .section--soft { background: var(--color-bg-soft); }
    .section--dark { background: var(--color-secondary); color: #fff; }
    .section__eyebrow { display: inline-flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--color-primary); margin-bottom: 16px; }
    .section__eyebrow::before { content: ''; width: 20px; height: 2px; background: var(--color-primary); border-radius: 2px; }
    .section__title { font-size: clamp(28px, 4vw, 42px); font-weight: 800; color: var(--color-text-dark); line-height: 1.2; margin-bottom: 16px; }
    .section--dark .section__title { color: #fff; }
    .section__subtitle { font-size: 17px; color: var(--color-text-light); max-width: 580px; line-height: 1.7; }
    .section--dark .section__subtitle { color: rgba(255,255,255,0.7); }
    .header { position: fixed; top: 0; left: 0; right: 0; z-index: 1000; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-bottom: 1px solid var(--color-border); }
    .header__inner { display: flex; align-items: center; justify-content: space-between; height: 64px; }
    .header__logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; color: var(--color-text-dark); }
    .header__logo-mark { width: 36px; height: 36px; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark)); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; color: #fff; font-weight: 800; font-size: 14px; }
    .header__logo-text { display: flex; flex-direction: column; line-height: 1.1; }
    .header__logo-text span:last-child { font-size: 10px; font-weight: 500; color: var(--color-text-lighter); }
    .header__nav { display: flex; align-items: center; gap: 4px; }
    .header__nav a { font-size: 14px; font-weight: 500; color: var(--color-text-light); padding: 6px 14px; border-radius: var(--radius-sm); transition: var(--transition); }
    .header__nav a:hover { color: var(--color-primary); background: var(--color-primary-50); }
    .header__cta { background: var(--color-primary); color: #fff !important; padding: 8px 18px !important; border-radius: var(--radius-sm) !important; font-weight: 600 !important; }
    .header__cta:hover { background: var(--color-primary-dark) !important; }
    .header__mobile-toggle { display: none; background: none; border: none; cursor: pointer; padding: 8px; color: var(--color-text); }
    .hero { padding: 140px 0 80px; background: linear-gradient(165deg, #EFF6FF 0%, #F8FAFC 40%, #fff 100%); position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px; background: radial-gradient(circle, rgba(37,99,235,0.06) 0%, transparent 70%); border-radius: 50%; }
    .hero::after { content: ''; position: absolute; bottom: -100px; left: -100px; width: 400px; height: 400px; background: radial-gradient(circle, rgba(37,99,235,0.04) 0%, transparent 70%); border-radius: 50%; }
    .hero__inner { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; position: relative; z-index: 1; }
    .hero__badge { display: inline-flex; align-items: center; gap: 6px; background: var(--color-primary-50); border: 1px solid rgba(37,99,235,0.15); color: var(--color-primary); font-size: 12px; font-weight: 600; padding: 5px 12px; border-radius: 20px; margin-bottom: 24px; }
    .hero__badge::before { content: ''; width: 6px; height: 6px; background: var(--color-primary); border-radius: 50%; }
    .hero__title { font-size: clamp(32px, 5vw, 56px); font-weight: 900; color: var(--color-text-dark); line-height: 1.15; margin-bottom: 20px; letter-spacing: -1px; }
    .hero__title .highlight { background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    .hero__desc { font-size: 17px; color: var(--color-text-light); line-height: 1.8; margin-bottom: 32px; max-width: 480px; }
    .hero__actions { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .btn { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; padding: 11px 22px; border-radius: var(--radius-sm); transition: var(--transition); border: none; cursor: pointer; font-family: inherit; }
    .btn--primary { background: var(--color-primary); color: #fff; }
    .btn--primary:hover { background: var(--color-primary-dark); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(37,99,235,0.3); }
    .btn--outline { background: transparent; color: var(--color-text); border: 1px solid var(--color-border); }
    .btn--outline:hover { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-50); }
    .btn--large { padding: 13px 28px; font-size: 15px; }
    .hero__stats { display: flex; gap: 32px; margin-top: 40px; padding-top: 32px; border-top: 1px solid var(--color-border); }
    .hero__stat { text-align: left; }
    .hero__stat-value { font-size: 28px; font-weight: 800; color: var(--color-text-dark); line-height: 1; }
    .hero__stat-label { font-size: 12px; color: var(--color-text-lighter); margin-top: 4px; }
    .hero__visual { position: relative; }
    .hero__card-stack { position: relative; perspective: 1000px; }
    .hero__card { background: #fff; border-radius: var(--radius-lg); padding: 28px; box-shadow: var(--shadow-xl); border: 1px solid var(--color-border); }
    .hero__card--main { position: relative; z-index: 2; }
    .hero__card--float { position: absolute; top: 30px; left: -30px; width: 220px; z-index: 1; opacity: 0.7; transform: rotate(-3deg); }
    .hero__card-tag { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; margin-bottom: 14px; }
    .tag--blue { background: var(--color-primary-50); color: var(--color-primary); }
    .tag--amber { background: var(--color-accent-light); color: var(--color-accent); }
    .hero__card-title { font-size: 15px; font-weight: 700; color: var(--color-text-dark); line-height: 1.4; margin-bottom: 10px; }
    .hero__card-meta { font-size: 12px; color: var(--color-text-lighter); display: flex; align-items: center; gap: 8px; }
    .hero__card-divider { height: 1px; background: var(--color-border); margin: 16px 0; }
    .hero__card-bar { height: 6px; background: var(--color-bg-soft); border-radius: 3px; overflow: hidden; }
    .hero__card-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--color-primary), var(--color-primary-light)); }
    .about { padding: 80px 0; }
    .about__grid { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: center; }
    .about__list { display: flex; flex-direction: column; gap: 20px; }
    .about__item { display: flex; gap: 16px; align-items: flex-start; }
    .about__icon { width: 44px; height: 44px; min-width: 44px; background: var(--color-primary-50); border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .about__item-title { font-size: 15px; font-weight: 700; color: var(--color-text-dark); margin-bottom: 4px; }
    .about__item-desc { font-size: 13px; color: var(--color-text-light); line-height: 1.6; }
    .content-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; margin-top: 40px; }
    .content-card { background: var(--color-bg); border-radius: var(--radius-lg); overflow: hidden; border: 1px solid var(--color-border); transition: var(--transition); }
    .content-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lg); border-color: transparent; }
    .content-card__image { height: 160px; background: linear-gradient(135deg, var(--color-primary-50), var(--color-bg-soft)); display: flex; align-items: center; justify-content: center; font-size: 40px; }
    .content-card__body { padding: 20px; }
    .content-card__type { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: var(--color-primary); margin-bottom: 8px; }
    .content-card__title { font-size: 15px; font-weight: 700; color: var(--color-text-dark); line-height: 1.4; margin-bottom: 8px; }
    .content-card__desc { font-size: 13px; color: var(--color-text-light); line-height: 1.6; margin-bottom: 12px; }
    .content-card__footer { display: flex; align-items: center; justify-content: space-between; font-size: 12px; color: var(--color-text-lighter); }
    .content-card__date::before { content: '📅 '; }
    .content-card__read::before { content: '⏱ '; }
